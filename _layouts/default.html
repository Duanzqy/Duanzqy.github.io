<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,500;6..72,700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
    <link rel="stylesheet" href="{{ '/assets/css/prose.css' | relative_url }}" />
  </head>
  <body>
    <!-- Reading progress bar -->
    <div class="reading-progress" id="readingProgress" aria-hidden="true"></div>

    <div class="page-shell">
      <!-- Site header -->
      <header class="site-header">
        <a class="brand" href="{{ '/' | relative_url }}">Boyang Guo</a>
        <nav class="top-nav" aria-label="Primary">
          <a href="{{ '/blog.html' | relative_url }}">Blog</a>
          <a href="{{ '/#writing' | relative_url }}">Writing</a>
          <a href="{{ '/#publications' | relative_url }}">Publications</a>
          <a href="{{ '/#projects' | relative_url }}">Projects</a>
          <a href="{{ '/#contact' | relative_url }}">Contact</a>
        </nav>
      </header>

      <main>
        {{ content }}
      </main>

      <!-- Footer -->
      <footer class="site-footer section-frame" id="contact">
        <div>
          <p class="section-kicker">Contact</p>
          <h2>Welcome to contact me!</h2>
        </div>
        <ul class="footer-links">
          <li><a href="mailto:byguo@mail.ustc.edu.cn">byguo@mail.ustc.edu.cn</a></li>
          <li><a href="https://github.com/Duanzqy">GitHub</a></li>
          <li><a href="#">Google Scholar / CV later</a></li>
        </ul>
      </footer>
    </div>

    <script>
      // Reading progress bar
      const bar = document.getElementById('readingProgress');
      if (bar) {
        const update = () => {
          const scrollTop = window.scrollY;
          const docHeight = document.documentElement.scrollHeight - window.innerHeight;
          bar.style.width = docHeight > 0 ? (scrollTop / docHeight * 100) + '%' : '0%';
        };
        window.addEventListener('scroll', update, { passive: true });
        update();
      }
    </script>
  </body>
</html>
